<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Velumeron UI-font icon fallback.
     The shell's icons are Nerd-Font glyphs (Private Use Area). The bundled per-template UI display
     fonts (Cinzel, Orbitron, …) carry no PUA glyphs, so on their own an icon would fall back to
     whatever font fontconfig happens to pick. This pins "FantasqueSansM Nerd Font" as the explicit,
     deterministic glyph fallback for every bundled UI display font — so nerd icons always render
     correctly, whatever main font a template (or the user) selects.
     Installed to ~/.config/fontconfig/conf.d/ by welcome_to_velumeron.sh. -->
<fontconfig>
  <match target="pattern">
    <test name="family"><string>Cinzel</string></test>
    <edit name="family" mode="append" binding="strong"><string>FantasqueSansM Nerd Font</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Orbitron</string></test>
    <edit name="family" mode="append" binding="strong"><string>FantasqueSansM Nerd Font</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Chivo Mono</string></test>
    <edit name="family" mode="append" binding="strong"><string>FantasqueSansM Nerd Font</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>VT323</string></test>
    <edit name="family" mode="append" binding="strong"><string>FantasqueSansM Nerd Font</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Shantell Sans</string></test>
    <edit name="family" mode="append" binding="strong"><string>FantasqueSansM Nerd Font</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Fredoka</string></test>
    <edit name="family" mode="append" binding="strong"><string>FantasqueSansM Nerd Font</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Audiowide</string></test>
    <edit name="family" mode="append" binding="strong"><string>FantasqueSansM Nerd Font</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Atomic Age</string></test>
    <edit name="family" mode="append" binding="strong"><string>FantasqueSansM Nerd Font</string></edit>
  </match>
</fontconfig>
