general {
    lock_cmd                = pidof hyprlock || ~/.config/velumeron/assets/scripts/launch-hyprlock.sh
    # Only *request* the lock here — hypridle then runs lock_cmd itself. A blocking
    # command (like the launch script, which runs until unlock) would hold logind's
    # delay inhibitor past its 5s limit, so the machine sleeps mid-hyprlock-init and
    # hyprlock (and with it the session) dies on resume.
    before_sleep_cmd        = loginctl lock-session
    after_sleep_cmd         = hyprctl dispatch 'hl.dsp.dpms("on")'
    # Hold the sleep inhibitor until the compositor reports the session lock as
    # active — hyprlock's GPU context is fully up before the system enters S3.
    inhibit_sleep           = 3
}

listener {
    timeout                 = 360
    on-timeout              = loginctl lock-session
}

listener {
    timeout                 = 840      
    on-timeout              = systemctl suspend
}
