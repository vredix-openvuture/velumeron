# https://wiki.hypr.land/Configuring/Binds/


$mainMod = SUPER
$SUPER   = $mainMod


## Application jump
bind = $mainMod, 1, exec, hyprctl dispatch workspace 1
bind = $mainMod, 2, exec, hyprctl dispatch workspace 2
bind = $mainMod, 3, exec, hyprctl dispatch workspace 3
bind = $mainMod, 4, exec, hyprctl dispatch workspace 4
bind = $mainMod, 5, exec, hyprctl dispatch workspace 5
bind = $mainMod, 6, exec, hyprctl dispatch workspace 6
bind = $mainMod, 7, exec, hyprctl dispatch workspace 7
bind = $mainMod, 8, exec, hyprctl dispatch workspace 8
bind = $mainMod, 9, exec, hyprctl dispatch workspace 9


## Session
bind = $mainMod, ESCAPE,    exit, 
bind = $mainMod, P,         exec, $on_sleep
bind = $mainMod, L,         exec, $on_lock
bind = $mainMod, O,         exec, $session_menu

## Utils
bind = $mainMod SHIFT, S,    exec, $screenshot
bind = $mainMod, SPACE,      exec, $launcher
bind = $mainMod ALT, SPACE,  exec, $theme_switch
bind = $mainMod, T,          exec, $terminal
bind = $mainMod, S,          exec, $notifications

 
## Windowmanagement
bind  = $mainMod, C,         killactive,
bind  = $mainMod, F,         togglefloating
bind  = $mainMod, V,         fullscreen, 1
bind  = $mainMod, M,         focusmonitor, +1
bind  = $mainMod, K,         cyclenext
bindc = $mainMod, mouse:272, togglefloating   # Click left mouse button
bindm = $mainMod, mouse:272, movewindow       # Hold left mouse button
bindm = $mainMod, mouse:273, resizewindow     # Hold right mouse button
bind  = $mainMod, mouse_up, exec, hyprctl dispatch workspace e+1
bind  = $mainMod, mouse_down, exec, hyprctl dispatch workspace e-1

## $mainMod KEYS with SUPER
# Monitor Backlight
bind = $mainMod, $fn_brighness_down,  exec, ddcutil --display 1 setvcp 10 50  && ddcutil --display 2 setvcp 10 50
bind = $mainMod, $fn_brightness_up,   exec, ddcutil --display 1 setvcp 10 100 && ddcutil --display 2 setvcp 10 100
# Media Control
bind = $mainMod, $fn_play_prev,       exec, playerctl previous
bind = $mainMod, $fn_play_stop_play,  exec, playerctl play-pause
bind = $mainMod, $fn_play_next,       exec, playerctl next
# Volume
bind = $mainMod, $fn_volume_mute,     exec, pactl set-sink-mute   @DEFAULT_SINK@ toggle
bind = $mainMod, $fn_volume_down,     exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = $mainMod, $fn_volume_up,       exec, pactl set-sink-volume @DEFAULT_SINK@ +5%


