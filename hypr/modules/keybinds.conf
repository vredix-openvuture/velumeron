exec-once = echo "normal" > /tmp/hypr-submap

## Windowmanagement
bind = $SUPER, W, exec, echo "window" > /tmp/hypr-submap
bind = $SUPER, W, submap, window
submap = window

    bind = , H,   resizeactive,  50   0
    bind = , L,   resizeactive, -50   0
    bind = , J,   resizeactive,   0  50
    bind = , K,   resizeactive,   0 -50
    
    bind = , F,   togglefloating
    bind = , Q,   fullscreen, 2
    bind = , O,   tagwindow, opacity_off

    bind = , 1, movetoworkspace, 1
    bind = , 2, movetoworkspace, 2
    bind = , 3, movetoworkspace, 3
    bind = , 4, movetoworkspace, 4
    bind = , 5, movetoworkspace, 5
    bind = , 6, movetoworkspace, 6
    bind = , 7, movetoworkspace, 7
    bind = , 8, movetoworkspace, 8
    bind = , 9, movetoworkspace, 9

    bind = , ESCAPE, exec, echo "normal" > /tmp/hypr-submap
    bind = , ESCAPE, submap, reset
    bind = , RETURN, exec, echo "normal" > /tmp/hypr-submap
    bind = , RETURN, submap, reset

submap = reset


## Navigate
bind = $SUPER, N, exec, echo "navigate" > /tmp/hypr-submap
bind = $SUPER, N, submap, navigate
submap = navigate

    bind = , H, workspace, m-1
    bind = , L, workspace, m+1
    bind = , J, cyclenext, prev
    bind = , K, cyclenext
    bind = , M, focusmonitor, +1

    bind = , 1, workspace, 1
    bind = , 2, workspace, 2
    bind = , 3, workspace, 3
    bind = , 4, workspace, 4
    bind = , 5, workspace, 5
    bind = , 6, workspace, 6
    bind = , 7, workspace, 7
    bind = , 8, workspace, 8
    bind = , 9, workspace, 9

    bind = , ESCAPE, exec, echo "normal" > /tmp/hypr-submap
    bind = , ESCAPE, submap, reset
    bind = , RETURN, exec, echo "normal" > /tmp/hypr-submap
    bind = , RETURN, submap, reset

submap = reset


## Quickstart
bind = $SUPER, Q, exec, echo "quickstart" > /tmp/hypr-submap
bind = $SUPER, Q, submap, quickstart
submap = quickstart

    bind = , 1, exec, echo "normal" > /tmp/hypr-submap
    bind = , 1, exec, $quick_app01
    bind = , 1, submap, reset
    bind = , 2, exec, echo "normal" > /tmp/hypr-submap
    bind = , 2, exec, $quick_app02
    bind = , 2, submap, reset
    bind = , 3, exec, echo "normal" > /tmp/hypr-submap
    bind = , 3, exec, $quick_app03
    bind = , 3, submap, reset
    bind = , 4, exec, echo "normal" > /tmp/hypr-submap
    bind = , 4, exec, $quick_app04
    bind = , 4, submap, reset
    bind = , 5, exec, echo "normal" > /tmp/hypr-submap
    bind = , 5, exec, $quick_app05
    bind = , 5, submap, reset
    bind = , 6, exec, echo "normal" > /tmp/hypr-submap
    bind = , 6, exec, $quick_app06
    bind = , 6, submap, reset
    bind = , 7, exec, echo "normal" > /tmp/hypr-submap
    bind = , 7, exec, $quick_app07
    bind = , 7, submap, reset
    bind = , 8, exec, echo "normal" > /tmp/hypr-submap
    bind = , 8, exec, $quick_app08
    bind = , 8, submap, reset
    bind = , 9, exec, echo "normal" > /tmp/hypr-submap
    bind = , 9, exec, $quick_app09
    bind = , 9, submap, reset

    bind = , ESCAPE, exec, echo "normal" > /tmp/hypr-submap
    bind = , ESCAPE, submap, reset
    bind = , RETURN, exec, echo "normal" > /tmp/hypr-submap
    bind = , RETURN, submap, reset

submap = reset


## Navigate
bind = $SUPER, D, exec, echo "developer" > /tmp/hypr-submap
bind = $SUPER, D, submap, developer
submap = developer

    bind = , W, exec, killall waybar && ~/.config/vutureland/assets/scripts/launcher.sh --waybar

    bind = , ESCAPE, exec, echo "normal" > /tmp/hypr-submap
    bind = , ESCAPE, submap, reset
    bind = , RETURN, exec, echo "normal" > /tmp/hypr-submap
    bind = , RETURN, submap, reset

submap = reset