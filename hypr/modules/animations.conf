# https://wiki.hypr.land/Configuring/Variables/#animations
# https://wiki.hypr.land/Configuring/Animations/#curves
 
animations {
  enabled = yes

  ### Definition von Bezier Kurven
  bezier = easeOutQuint,   0.23, 1,    0.32, 1
  bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
  bezier = linear,         0,    0,    1,    1
  bezier = almostLinear,   0.5,  0.5,  0.75, 1
  bezier = quick,          0.15, 0,    0.1,  1

  ### Zuweisung von Animationen
  animation = global,        1,     10,    default
  animation = border,        1,     5.39,  easeOutQuint

  animation = windows,       1,     4.79,  easeOutQuint
  animation = windowsIn,     1,     4.1,   easeOutQuint, slide top 90%
  animation = windowsOut,    1,     1.4,   linear,       slide top 90%

  animation = fade,          1,     3.03,  quick
  animation = layers,        1,     3,     quick 
  #animation = layersIn,      1,     3,     easeOutQuint
  #animation = layersOut,     1,     3,     linear
  animation = fadeLayersIn,  1,     1.4,  almostLinear
  animation = fadeLayersOut, 1,     1.39,  almostLinear
    
  animation = workspaces,    1,     1.94,  almostLinear, slidevert
  animation = workspacesIn,  1,     2.2 ,  almostLinear, slidefade left 80%
  animation = workspacesOut, 1,     2.2 ,  almostLinear, slidefade top 80%
    
  animation = zoomFactor,    1,     7,     quick
}

