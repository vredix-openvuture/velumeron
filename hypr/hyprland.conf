# https://wiki.hypr.land/Configuring/


# ═══════════════════════════════════════════════════════
# THEME COLORS
# ═══════════════════════════════════════════════════════

source = ~/.config/vutureland/assets/colors_hyprland.conf


# ═══════════════════════════════════════════════════════
# USER SETTINGS  (device-specific, not in git)
# ═══════════════════════════════════════════════════════

source = ~/.config/vutureland/hypr/user_settings.conf


# ═══════════════════════════════════════════════════════
# VUTURELAND MODULES
# ═══════════════════════════════════════════════════════

source = ~/.config/vutureland/hypr/modules/gpu.conf
source = ~/.config/vutureland/hypr/modules/variables.conf
source = ~/.config/vutureland/hypr/modules/autostart.conf
source = ~/.config/vutureland/hypr/modules/windowrules.conf

source = ~/.config/vutureland/hypr/modules/animations.conf
source = ~/.config/vutureland/hypr/modules/devices.conf
source = ~/.config/vutureland/hypr/modules/environment.conf
source = ~/.config/vutureland/hypr/modules/keybinds.conf
source = ~/.config/vutureland/hypr/modules/layerrules.conf
source = ~/.config/vutureland/hypr/modules/look_and_feel.conf


